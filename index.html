
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Financeira - Portabilidade de Consignado: Pague Menos e Libere Dinheiro</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/4K7cHUK.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gov-blue: #004088;
            --gov-blue-dark: #003066;
            --gov-gray: #f8f8f8;
            --gov-text: #333333;
            --gov-text-light: #666666;
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            scroll-behavior: smooth; 
            background-color: #ffffff;
            color: var(--gov-text);
            line-height: 1.5;
        }
        h1, h2, h3, h4 { 
            font-weight: 700; 
            color: var(--gov-blue);
            letter-spacing: -0.02em;
        }
        p {
            color: var(--gov-text-light);
        }

        .gov-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .btn-gov-primary {
            background-color: var(--gov-blue);
            color: #ffffff;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }
        .btn-gov-primary:hover {
            background-color: var(--gov-blue-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-gov-secondary {
            background-color: #ffffff;
            color: var(--gov-blue);
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--gov-blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }
        .btn-gov-secondary:hover {
            background-color: #f0f5ff;
        }
    </style>
</head>
<body class="text-gray-800 selection:bg-[#004088] selection:text-white">
    <div class="noise"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
